{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  {{ if .Date }}
    {{ if not .Date.IsZero }}
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    {{ end }}
  {{ end }}
  {{ .Content }}
  {{ partial "series-nav.html" . }}
</article>
{{ end }}
