{{ $parent := .CurrentSection }}
{{ if and $parent (ne $parent.Kind "home") (ne $parent.Title "Writing") }}
<nav class="series-nav">
  {{ with .PrevInSection }}
    <a href="{{ .Permalink }}" class="series-prev">&larr; {{ .Title }}</a>
  {{ end }}
  <a href="{{ $parent.Permalink }}" class="series-up">{{ $parent.Title }}</a>
  {{ with .NextInSection }}
    <a href="{{ .Permalink }}" class="series-next">{{ .Title }} &rarr;</a>
  {{ end }}
</nav>
{{ end }}
